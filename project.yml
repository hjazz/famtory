name: Famtory
options:
  bundleIdPrefix: com.famtory
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

schemes:
  Famtory:
    build:
      targets:
        Famtory: all
        FamtoryTests: [test]
    run:
      config: Debug
    test:
      targets:
        - FamtoryTests
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Famtory:
    type: application
    platform: iOS
    sources:
      - path: Famtory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.famtory.app
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Famtory/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    info:
      path: Famtory/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        FirebaseAppDelegateProxyEnabled: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.362347200012-su9doq4mjdts54semrar3riaoced0qj8

  FamtoryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamtoryTests
    dependencies:
      - target: Famtory
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
